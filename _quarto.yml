project:
  type: website
  render:
    - index.qmd
    - about.qmd
    - news.qmd

website:
  title: "Capivara"

  navbar:
    background: "#17386d"
    foreground: white
    left:
      - text: Home
        href: index.qmd
      - text: Release Notes
        href: news.qmd
      - text: About
        href: about.qmd
    right:
      - icon: github
        href: https://github.com/RafaelSdeSouza/capivara

  page-footer:
    left: "© 2026 Rafael S. de Souza"
    right: "Built with Quarto"

format:
  html:
    theme:
      light: flatly
    toc: false
    toc-depth: 3
    smooth-scroll: true
    code-copy: true
    code-line-numbers: true
    css: styles.css
