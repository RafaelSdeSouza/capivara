<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Capivara logo</title>
  <desc id="desc">A stylized capybara with spectral stripes on a deep blue badge.</desc>
  <defs>
    <linearGradient id="bg" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b3650"/>
      <stop offset="1" stop-color="#294f69"/>
    </linearGradient>
    <linearGradient id="fur" x1="105" y1="146" x2="388" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d7a24c"/>
      <stop offset="1" stop-color="#a66a1a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0d1b27" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="36" y="36" width="440" height="440" rx="120" fill="url(#bg)"/>

  <g opacity="0.18">
