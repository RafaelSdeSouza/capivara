    <circle cx="176" cy="220" r="80" fill="url(#fur)" stroke="#102432" stroke-width="12"/>
    <circle cx="208" cy="148" r="29" fill="#a96a1c" stroke="#102432" stroke-width="10"/>
    <circle cx="208" cy="148" r="12" fill="#d9a85c"/>
