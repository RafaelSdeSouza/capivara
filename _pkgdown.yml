url: https://rafaelsdesouza.github.io/capivara/

template:
  bootstrap: 5
  bootswatch: flatly

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [github]

reference:
  - title: Core Segmentation
    desc: Main user-facing segmentation functions.
    contents:
      - segment
      - segment_large
      - choose_ncomp_by_snr
      - estimate_segment_memory
  - title: Support Masks
    desc: Foreground support builders used before segmentation.
    contents:
      - build_starlet_mask
      - build_adaptive_support
  - title: Spectral Summaries and Reconstruction
    desc: Flux-preserving products for downstream spectral fitting.
    contents:
      - summarize_cluster_spectra
      - reconstruct_cluster_cube
      - reconstruct_flux_preserving_cube
  - title: Plotting
    desc: Lightweight plotting helpers.
    contents:
      - plot_cluster
      - plot_cluster_spectra
  - title: Kinematic Analysis
    desc: Native line maps and the neutral kinematic workflow.
    contents:
      - segment_kinematics
      - run_kinematic_analysis
      - kinematic_models
  - title: Bar Modelling
    desc: Explicit bisymmetric modelling for galaxies with an imaging-based bar angle.
    contents:
      - run_manga_bar_model

articles:
  - title: Workflows
    navbar: Workflows
    contents:
      - kinematic-analysis
      - bisymmetric-bar-model
